<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="stylesheet" 
          href="formatting.css">
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body onload="closeNav()">
    <!-- Top Navigation Menu -->
    <div id="sidenav" class="sidenav">
        <div id="myLinks"></div>
            <img id="image"
                src="bear.png" 
                alt="bear">
            <a href="javascript:void(0);" 
               class="active" 
               onclick="closeNav()">&times;</a>
            <a href="./home/homepage.html">Home</a>
            <a href="/contact/contact.html">Contact</a>
            <a href="/about/about.html">About</a>
        </div>
        <button class="icon" onclick="openNav()"><i class="fa fa-bars"></i></button>
        
    </div>
    <div id="main">
        <div id="header">
            <h1 class="title">My Blog</h1>
        </div>
        
        <iframe name="hiddenFrame" width="0" height="0" border="0" style="display: none;"></iframe>
        <form name="form" 
            method="post" 
            autocomplete="off" 
            target="hiddenFrame"
            onsubmit="saveEntry()">
            <label for="entry" 
                class="inputs">Blog Entry:</label><br>
                <div class="grow-wrap">
                <textarea name="entry"
                        id="entry" 
                        class="inputs" 
                        maxlength="300" 
                        oninput="countText()"></textarea>
                </div>
                <input type="date" id="when" name="when">
                <input type="submit"
                    name="done" 
                    id="done" 
                    value="Submit">
            <div id="counter">
                <span id="current">0</span>
                <span id="maximum">/ 300</span>
            </div>
        </form>
        <div class="container">
            <ul class="output"
                id="output1"></ul>
        </div>
    </div>
    </body>
    <script src="index.js"></script>
    
</body>
</html>
