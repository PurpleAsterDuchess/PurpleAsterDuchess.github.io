<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" 
          href="/formatting.css">
</head>
<body>
    <h1 class="title">My Blog</h1>
    <form method="post" autocomplete="off" target="_blank" onsubmit="save(event)">
        <label for="entry">What did you do today?</label><br>
            <textarea name="entry" id="entry" cols="30" rows="10"></textarea>
            <input type="submit" name="done" id="done" value="Submit">
    </form>

    <script type="text/javascript">
        let save = (event) => {
            event.preventDefault();
            let blogEntry = document.getElementById("entry").value;
            localStorage.setItem("ls_entry", blogEntry);
        }

    </script>
</body>
</html>
